<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Habit Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
[data-theme="dark"] { --bg:#0f0f0f; --surface:#1c1c1c; --surface-2:#242424; --text:#f0ede6; --text-muted:#888; --border:#333; --shadow:0 2px 12px rgba(0,0,0,0.4); }
[data-theme="light"] { --bg:#f0ede6; --surface:#ffffff; --surface-2:#f7f6f3; --text:#1a1a1a; --text-muted:#666; --border:#e0e0e0; --shadow:0 2px 12px rgba(0,0,0,0.06); }
body {
  min-height: 100vh;
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: grid;
  place-items: center;
  padding: 24px;
  line-height: 1.5;
}
button, input { font: inherit; }
button { cursor: pointer; }
.lang-toggle-fixed {
  position: fixed; top: 16px; right: 16px; z-index: 20;
  background: #1a1a1a; color: #c4a87a; border: none; border-radius: 20px;
  padding: 6px 16px; font-weight: 700;
}
.theme-toggle {
  position: fixed; top: 16px; left: 16px; z-index: 20;
  width: 36px; height: 36px; border: 1px solid rgba(196,168,122,0.35);
  border-radius: 50%; background: #1a1a1a; color: #c4a87a;
}
.auth-card {
  width: min(100%, 420px);
  background: var(--surface);
  border-radius: 14px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.12);
  overflow: hidden;
}
.top-strip { height: 4px; background: linear-gradient(90deg, #c4a87a, #e8d5b7); }
.auth-content { padding: 32px; }
.brand { text-align: center; margin-bottom: 22px; }
.brand-icon { font-size: 2.1rem; display: block; margin-bottom: 8px; }
.brand-title {
  font-size: 1.65rem;
  font-weight: 800;
  background: linear-gradient(135deg, #e8d5b7, #c4a87a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.intro { text-align: center; margin-bottom: 24px; }
.intro h2 { font-size: 1.35rem; margin-bottom: 6px; }
.intro p { color: var(--text-muted); }
.field { margin-bottom: 18px; }
label { display: block; font-weight: 700; margin-bottom: 7px; }
input {
  width: 100%; height: 44px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--surface-2); color: var(--text); padding: 0 12px; outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
input:focus { border-color: #c4a87a; box-shadow: 0 0 0 3px rgba(196,168,122,0.16); }
.field.invalid input { border-color: #a33030; }
.error { min-height: 18px; color: #a33030; font-size: 0.78rem; margin-top: 5px; }
.primary-btn {
  width: 100%; height: 48px; border: none; border-radius: 8px;
  background: linear-gradient(135deg, #c4a87a, #a8885a);
  color: #1a1a1a; font-weight: 800;
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
}
.primary-btn:disabled { opacity: 0.7; cursor: wait; }
.secondary-btn {
  width: 100%; height: 42px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--surface-2); color: var(--text); font-weight: 700;
}
.secondary-btn:disabled { opacity: 0.55; cursor: not-allowed; }
.spinner {
  width: 16px; height: 16px; border: 2px solid rgba(26,26,26,0.25);
  border-top-color: #1a1a1a; border-radius: 50%; animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.back-link { display: block; margin-top: 18px; text-align: center; color: #8f7048; text-decoration: none; font-weight: 700; }
.back-link:hover { text-decoration: underline; }
.sent-state { display: none; text-align: center; }
.sent-state.active { display: block; }
.request-state.hidden { display: none; }
.check {
  width: 74px; height: 74px; margin: 4px auto 18px; border-radius: 50%;
  background: #4a7c42; color: #fff; display: grid; place-items: center;
  font-size: 2.6rem; font-weight: 800;
}
.sent-state h2 { font-size: 1.45rem; margin-bottom: 8px; }
.sent-state p { color: var(--text-muted); margin-bottom: 22px; }
.toast {
  position: fixed; bottom: 24px; left: 24px; min-width: 280px; max-width: 360px;
  background: #1a1a1a; color: #fff; padding: 14px 18px; border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3); display: flex; align-items: center;
  gap: 10px; z-index: 9999; transform: translateY(100px); opacity: 0;
  transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-right: 4px solid #4a7c42; }
.toast.error { border-right: 4px solid #a33030; }
.toast.info { border-right: 4px solid #c4a87a; }
[dir="ltr"] .toast { left: auto; right: 24px; }
[dir="ltr"] .toast.success, [dir="ltr"] .toast.error, [dir="ltr"] .toast.info { border-right: 0; border-left: 4px solid; }
[dir="ltr"] .toast.success { border-left-color: #4a7c42; }
[dir="ltr"] .toast.error { border-left-color: #a33030; }
[dir="ltr"] .toast.info { border-left-color: #c4a87a; }
@media (max-width: 480px) {
  body { padding: 0; }
  .auth-card { width: 100%; min-height: 100vh; border-radius: 0; box-shadow: none; }
  .auth-content { padding: 76px 22px 28px; }
  .lang-toggle-fixed { top: 12px; right: 12px; }
  .theme-toggle { top: 12px; left: 12px; }
  .toast { left: 50%; right: auto; transform: translate(-50%, 100px); width: calc(100% - 32px); min-width: 0; }
  .toast.show { transform: translate(-50%, 0); }
}
</style>
</head>
<body>
<button id="langToggle" class="lang-toggle-fixed" onclick="toggleLanguage()">EN English</button>
<button id="themeIcon" class="theme-toggle" onclick="toggleTheme()" title="Theme">🌙</button>

<main class="auth-card">
  <div class="top-strip"></div>
  <div class="auth-content">
    <header class="brand">
      <span class="brand-icon">📅</span>
      <h1 class="brand-title" data-ar="متتبع العادات" data-en="Habit Tracker">متتبع العادات</h1>
    </header>

    <section id="requestState" class="request-state">
      <div class="intro">
        <h2 data-ar="إعادة تعيين كلمة المرور" data-en="Reset Password">إعادة تعيين كلمة المرور</h2>
        <p data-ar="أدخل بريدك الإلكتروني وسنرسل لك رابط الإعادة" data-en="Enter your email and we'll send a reset link">أدخل بريدك الإلكتروني وسنرسل لك رابط الإعادة</p>
      </div>
      <form id="resetForm" novalidate>
        <div class="field" data-field="email">
          <label for="email" data-ar="البريد الإلكتروني" data-en="Email">البريد الإلكتروني</label>
          <input id="email" type="email" autocomplete="email">
          <div class="error"></div>
        </div>
        <button id="sendButton" class="primary-btn" type="submit" data-ar="إرسال رابط الإعادة" data-en="Send Reset Link">إرسال رابط الإعادة</button>
      </form>
      <a class="back-link" href="login.html" data-ar="العودة لتسجيل الدخول" data-en="Back to login">العودة لتسجيل الدخول</a>
    </section>

    <section id="sentState" class="sent-state">
      <div class="check">✓</div>
      <h2 data-ar="تم إرسال الرابط!" data-en="Link Sent!">تم إرسال الرابط!</h2>
      <p data-ar="تحقق من بريدك الإلكتروني" data-en="Check your email inbox">تحقق من بريدك الإلكتروني</p>
      <button id="resendButton" class="secondary-btn" type="button" onclick="resend()" disabled></button>
      <a class="back-link" href="login.html" data-ar="العودة لتسجيل الدخول" data-en="Back to login">العودة لتسجيل الدخول</a>
    </section>
  </div>
</main>

<script>
const SUPABASE_URL = "https://kkxunzwxjqljsoehridz.supabase.co";
const SUPABASE_KEY = "sb_publishable_LJ1P10kpXTEHPcXuECTTpg_0ALzHMDg";
const { createClient } = supabase;
const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
let currentLang = localStorage.getItem('lang') || 'ar';
let resetEmail = '';
let countdownTimer;
let secondsLeft = 0;
const messages = {
  ar: { invalidEmail:'أدخل بريدًا إلكترونيًا صحيحًا', sending:'جاري الإرسال...', sent:'تم إرسال رابط إعادة التعيين', resendIn:s => `إعادة الإرسال خلال ${s} ثانية`, resend:'إعادة الإرسال' },
  en: { invalidEmail:'Enter a valid email address', sending:'Sending...', sent:'Reset link sent', resendIn:s => `Resend in ${s}s`, resend:'Resend' }
};
function t(key, arg) {
  const value = messages[currentLang][key];
  return typeof value === 'function' ? value(arg) : value;
}
function setLanguage(lang) {
  currentLang = lang;
  localStorage.setItem('lang', lang);
  document.documentElement.setAttribute('lang', lang);
  document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
  document.querySelectorAll('[data-ar]').forEach(el => { el.textContent = el.getAttribute(`data-${lang}`); });
  document.getElementById('langToggle').textContent = lang === 'ar' ? 'EN English' : 'AR عربي';
  updateResendButton();
}
function toggleLanguage() { setLanguage(currentLang === 'ar' ? 'en' : 'ar'); }
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('themeIcon').textContent = next === 'dark' ? '☀️' : '🌙';
}
function applyTheme() {
  const savedTheme = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
  document.getElementById('themeIcon').textContent = savedTheme === 'dark' ? '☀️' : '🌙';
}
function showToast(message, type = 'info', duration = 4000) {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ';
  toast.innerHTML = `<span style="font-size:1.2rem">${icon}</span><span>${message}</span>`;
  document.body.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 350); }, duration);
}
function setError(message = '') {
  const field = document.querySelector('[data-field="email"]');
  field.classList.toggle('invalid', Boolean(message));
  field.querySelector('.error').textContent = message;
}
function validateEmail() {
  const email = document.getElementById('email').value.trim();
  setError(emailRegex.test(email) ? '' : t('invalidEmail'));
  return emailRegex.test(email);
}
function resetRedirectTo() {
  if (window.location.origin === 'null') return window.location.href.replace(/forgot-password\.html.*$/, 'login.html');
  const basePath = window.location.pathname.replace(/[^/]*$/, '');
  return window.location.origin + basePath + 'login.html';
}
async function sendReset(email) {
  const { error } = await _supabase.auth.resetPasswordForEmail(email, { redirectTo: resetRedirectTo() });
  if (error) throw error;
}
function updateResendButton() {
  const button = document.getElementById('resendButton');
  if (!button) return;
  button.textContent = secondsLeft > 0 ? t('resendIn', secondsLeft) : t('resend');
  button.disabled = secondsLeft > 0;
}
function startCountdown() {
  clearInterval(countdownTimer);
  secondsLeft = 60;
  updateResendButton();
  countdownTimer = setInterval(() => {
    secondsLeft -= 1;
    updateResendButton();
    if (secondsLeft <= 0) clearInterval(countdownTimer);
  }, 1000);
}
async function resend() {
  try {
    await sendReset(resetEmail);
    showToast(t('sent'), 'success');
    startCountdown();
  } catch (error) {
    showToast(error.message, 'error');
  }
}
document.getElementById('resetForm').addEventListener('submit', async e => {
  e.preventDefault();
  if (!validateEmail()) return;
  const button = document.getElementById('sendButton');
  const original = button.getAttribute(`data-${currentLang}`);
  button.disabled = true;
  button.innerHTML = `<span class="spinner"></span><span>${t('sending')}</span>`;
  resetEmail = document.getElementById('email').value.trim();
  try {
    await sendReset(resetEmail);
    showToast(t('sent'), 'success');
    document.getElementById('requestState').classList.add('hidden');
    document.getElementById('sentState').classList.add('active');
    startCountdown();
  } catch (error) {
    showToast(error.message, 'error');
  } finally {
    button.disabled = false;
    button.textContent = original;
  }
});
document.getElementById('email').addEventListener('blur', validateEmail);
applyTheme();
setLanguage(currentLang);
</script>
</body>
</html>
